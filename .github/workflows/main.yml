name: TikTok Live KPI Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Update ke v4

      - name: Setup Python
        uses: actions/setup-python@v5 # Update ke v5
        with:
          python-version: '3.11'

      - name: Install Libraries
        run: pip install -r requirements.txt

      - name: Run Python Script
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Save Status
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Pastikan kita di branch main dan selari dengan origin
          git pull origin main --rebase
          
          # Hanya commit kalau ada perubahan pada status.json
          git add status.json
          if git diff --staged --quiet; then
            echo "Tiada perubahan pada status.json"
          else
            git commit -m "Update live status [skip ci]"
            git push origin main
          fi
