name: TikTok Live KPI Monitor

on:
  schedule:
    # GitHub mungkin delay 10-30 minit, tapi kita tetap set 10 minit
    - cron: '*/10 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [check_live]

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Libraries
        run: |
          pip install requests gspread google-auth

      - name: Run Python Script
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Save Status & Keep-Alive
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          date > last_run.txt
          git add status.json last_run.txt
          git commit -m "Bot Run: $(date) [skip ci]" || echo "No changes"
          git pull origin main --rebase
          git push origin main
                    
          git add status.json last_run.txt
          
          if git diff --staged --quiet; then
            echo "Tiada perubahan untuk di-commit."
          else
            git commit -m "Bot Update: $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"
            git pull origin main --rebase
            git push origin main
          fi
